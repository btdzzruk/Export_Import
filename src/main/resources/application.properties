spring.application.name=Library
server.port=8080

# Datasource
spring.datasource.url=jdbc:mariadb://localhost:3306/quan_ly_thu_vien?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456789

# JPA - Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# Upload file size
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# Logging cho import process
logging.level.com.example.library.service=INFO

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/library
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/library/protocol/openid-connect/certs

